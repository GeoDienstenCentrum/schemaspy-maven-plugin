name: 'Release Drafter & Contributors'

on:
  push:
    branches:
      - master

jobs:
  update_release_draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    name: 'Update release Draft'
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
